# Lemberetes para atualizações de manual
name: Manual Reminder for @marpisco

on:
  pull_request:
    types: [opened, synchronize] # 'synchronize' triggers on new commits
    paths:
      - 'src/**'
      - 'lib/**'
      - '**.js'
      - '**.php'

jobs:
  remind:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: "📝 **Manual Update Required?** It looks like you've modified core logic. Please check if the user manual needs a refresh! @marpisco"
            })
